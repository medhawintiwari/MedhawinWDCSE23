<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Function- block of code , used or defined to perform specific 
        //types of function
        //normal function :- with parameters, without parameters and with default


        //normal functio without parameters
        function demo() {
            console.log("Hello JS");
        }
        demo(); //function calling

        //with parameters 
        function demo1(text) {
            console.log("Hello" + text);
        }
        demo1("React");


        //with default parameters

        function add(a, b=12) {
            console.log("Addition:" + (a+b));
        }
        add(34, 13);
    </script>
    <script>
        //synchronous function
        function cal() {
            function add(a, b) {
                console.log("add "+ a+b);
            }
            function mul(a, b) {
                console.log(a*b)
            }
            function sub(a, b) {
                console.log(a-b)
            }
            add(3,4);
            sub(4,2);
            mul(3,3);
        }
        cal();


        //Anonymous function
        let msg=function() {
            console.log("Hello World");
            //console.log(typeof(msg))
        }
        msg();

        //short code for above function = ARROW FUNCTION
        let msg1=()=>console.log("Hello 3000");
        msg1();
        // arrow function using multiple lines
        let msg2=(a, b)=> {
            var num1=a;
            var num2=b;
            var res=num1/num2;
            console.log("Result is "+ res);
        }
        msg2(10, 20);

        //IIFE: An Immediately Invoked Function Expression (IIFE)
        // in JavaScript is a function that runs as
        //  soon as it is defined
        (function(){
            console.log("Hello World");
        })();
        (msg=>console.log("helloooo"))();
    </script>
    
</body>
</html>
