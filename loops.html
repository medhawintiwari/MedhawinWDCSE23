<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops</title>
</head>
<body>
    <script>
        //type of loops

        let studentList=[["samay",34], "Medhawin", "Hamza", "Nabh", 20, 23, 56];
        //for loop
        for (let i=0; i<studentList.length;i++ ) {
            //console.log(student.list[0][1]);
            console.log(studentList[3]);
        }

        //while loop
        let i=0;
        while(i<=studentList.length()) {
            console.log(studentList[5]);
            i++;
        }
        //for..in loop
        for (let x of studentList) {
            console.log(x);

        }

    </script>
    
</body>
</html>
