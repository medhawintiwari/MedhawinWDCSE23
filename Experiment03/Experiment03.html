<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 03</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <!-- main start -->
    <div class="max-w-5xl mx-auto px-4 space-y-6">

        <!-- nav start -->
        <nav class="bg-sky-500 p-4 rounded-lg">

                <li><a href="#" class="hover:underline">Home</a></li>

        <section class="grid grid-cols-1 lg:grid-cols-3 sm:grid-cols-1 bg-cyan-100 gap-4 p-4 rounded-lg">

        <div class="bg-gray-900 py-24 sm:py-32 rounded-lg text-white text-center">
