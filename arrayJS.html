<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
        //array is a collection of any data types
        let num=[3,2,23,2,75,4,3];
        console.log(num.lastIndexOf(4))
        console.log("length is" + num.length);
        //remove last eleemnt
        console.log(num.pop());
        console.log("updated array" + num);
        //add element at last
        console.log(num.push(90));
        console.log("updated array after push method" + num)
        //shift and unshift 
        console.log(num.shift());
        console.log('updated array after shift $(num)')

        console.log(num.unshift(45));
        console.log('updated array after shift $(num)')
    </script>
    
</body>
</html>
